<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}WildGuard AI{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f8fafc;
            color: #0f172a;
            font-family: Arial, sans-serif;
        }

        .navbar {
            background: #0f172a;
            padding: 14px 28px;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            margin-right: 18px;
            font-weight: 700;
        }

        .page-container {
            max-width: 1100px;
            margin: 36px auto;
            padding: 0 20px;
        }
    </style>

    {% block extra_style %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <a href="/">WildGuard AI</a>
        <a href="/risk">위험도 예측</a>
        <a href="/vision">Vision 분석</a>
    </nav>

    <main class="page-container">
        {% block content %}{% endblock %}
    </main>
{% block extra_script %}{% endblock %}
</body>
</html>
