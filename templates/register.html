<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>WildGuard AI - 회원가입</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">WildGuard AI</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="{{ url_for('auth.login') }}">로그인</a>
        </div>
    </div>
</nav>

<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h1 class="h3 fw-bold mb-4">회원가입</h1>

                    {% with messages = get_flashed_messages() %}
                    {% if messages %}
                    <div class="alert alert-warning">
                        {{ messages[0] }}
                    </div>
                    {% endif %}
                    {% endwith %}

                    <form method="post" action="{{ url_for('auth.register') }}">
                        <div class="mb-3">
                            <label class="form-label" for="username">아이디</label>
                            <input class="form-control" id="username" name="username" value="{{ username or '' }}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="password">비밀번호</label>
                            <input class="form-control" id="password" name="password" type="password" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="password_confirm">비밀번호 확인</label>
                            <input class="form-control" id="password_confirm" name="password_confirm" type="password" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="name">이름</label>
                            <input class="form-control" id="name" name="name" value="{{ name or '' }}">
                        </div>

                        <div class="mb-4">
                            <label class="form-label" for="email">이메일</label>
                            <input class="form-control" id="email" name="email" type="email" value="{{ email or '' }}">
                        </div>

                        <button class="btn btn-primary w-100" type="submit">회원가입</button>
                    </form>

                    <div class="text-center mt-3">
                        <a href="{{ url_for('auth.login') }}">이미 계정이 있습니다</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
