<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>WildGuard AI - 위험도 예측</title>
</head>
<body>
    <h1>WildGuard AI 위험도 예측</h1>

    <form id="riskForm">
        <label>주야간</label>
        <select name="day">
            <option value="day">day</option>
            <option value="night" selected>night</option>
        </select>
        <br><br>

        <label>카메라 타입</label>
        <select name="camera_type">
            <option value="RGB">RGB</option>
            <option value="IR" selected>IR</option>
        </select>
        <br><br>

        <label>날씨</label>
        <input type="text" name="weather" value="cloudy">
        <br><br>

        <label>위치</label>
        <input type="text" name="location" value="대산농원">
        <br><br>

        <label>시간대</label>
        <select name="time_zone">
            <option value="dawn">dawn</option>
            <option value="day">day</option>
            <option value="evening">evening</option>
            <option value="night" selected>night</option>
        </select>
        <br><br>

        <label>계절</label>
        <select name="season">
            <option value="spring">spring</option>
            <option value="summer">summer</option>
            <option value="fall" selected>fall</option>
            <option value="winter">winter</option>
        </select>
        <br><br>

        <label>객체 수</label>
        <input type="number" name="object_count" value="2">
        <br><br>

        <label>최대 bbox 면적 비율</label>
        <input type="number" step="0.0001" name="max_bbox_area_ratio" value="0.0235">
        <br><br>

        <label>평균 bbox 면적 비율</label>
        <input type="number" step="0.0001" name="avg_bbox_area_ratio" value="0.0206">
        <br><br>

        <button type="submit">위험도 예측</button>
    </form>

    <hr>

    <h2>예측 결과</h2>
    <pre id="result">아직 예측하지 않았습니다.</pre>

    <script>
        document.getElementById("riskForm").addEventListener("submit", async function (event) {
            event.preventDefault();

            const formData = new FormData(event.target);

            const data = {
                day: formData.get("day"),
                camera_type: formData.get("camera_type"),
                weather: formData.get("weather"),
                location: formData.get("location"),
                time_zone: formData.get("time_zone"),
                season: formData.get("season"),
                object_count: Number(formData.get("object_count")),
                max_bbox_area_ratio: Number(formData.get("max_bbox_area_ratio")),
                avg_bbox_area_ratio: Number(formData.get("avg_bbox_area_ratio"))
            };

            const response = await fetch("/api/risk/predict", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(data)
            });

            const result = await response.json();

            document.getElementById("result").textContent = JSON.stringify(result, null, 2);
        });
    </script>
</body>
</html>
